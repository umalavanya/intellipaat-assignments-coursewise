<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        *{

            margin: 0 ;
            padding: 0 ;

        }

        #todoForm{

            display: flex ;
            flex-direction: column;
            justify-content: center;
            align-items : center ;
            height: 100vh ;
            gap: 20px ;

        }

        #input{
            padding: 5px ;
            border-radius: 10px;
        }

        #task-button{
            padding: 10px ;
            border-radius: 10px ;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="container">

        <div id="todoForm">
            <label>Add task:</label>
            <input type="text" id="input" name="input">
            <button id="task-button" onClick="handleOnClick()">Submit</button>
        </div>

        <div id="add-task"></div>
     
    </div>

    <script src="script.js"></script>
    
</body>
</html>
