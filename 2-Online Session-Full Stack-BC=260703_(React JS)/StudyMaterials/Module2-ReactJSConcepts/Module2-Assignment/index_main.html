<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>

    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #8ECA3C;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #root {
            width: 100%;
            max-width: 600px;
        }

        .todo-container {
            background: #BBDC12;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #276F27;
        }

        .todo-title {
            text-align: center;
            color: #276F27;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .todo-title i {
            color: #499A13;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #276F27;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #499A13;
            font-size: 1rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border: 2px solid #276F27;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
            background: white;
            color: #276F27;
        }

        .form-input:focus {
            border-color: #499A13;
            background: #f0f8e8;
            box-shadow: 0 0 0 4px rgba(73, 154, 19, 0.2);
        }

        .form-input::placeholder {
            color: #8ECA3C;
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: #499A13;
            color: white;
            border: 2px solid #276F27;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
        }

        .add-btn:hover {
            background: #276F27;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39, 111, 39, 0.3);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .add-btn i {
            font-size: 1.1rem;
        }

        .preview-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px dashed #276F27;
        }

        .preview-title {
            color: #276F27;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .preview-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            border: 2px solid #276F27;
            transition: all 0.3s ease;
        }

        .preview-box.has-value {
            border-color: #499A13;
            background: #f0f8e8;
        }

        .preview-text {
            color: #276F27;
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-word;
        }

        .preview-empty {
            color: #8ECA3C;
            font-size: 0.95rem;
        }

        .preview-empty i {
            margin-right: 8px;
        }

        .todo-stats {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 10px;
            border: 2px solid #276F27;
        }

        .todo-stats span {
            color: #276F27;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .todo-stats .count {
            color: #499A13;
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Todo List Items */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin-bottom: 10px;
            background: white;
            border-radius: 10px;
            border: 2px solid #276F27;
            transition: all 0.3s ease;
        }

        .todo-item:hover {
            border-color: #499A13;
            box-shadow: 0 4px 12px rgba(73, 154, 19, 0.2);
        }

        .todo-item.completed {
            background: #f0f8e8;
            border-color: #8ECA3C;
        }

        .todo-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .todo-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #499A13;
        }

        .todo-item-text {
            color: #276F27;
            font-weight: 500;
            word-break: break-word;
            flex: 1;
        }

        .todo-item-text.completed-text {
            text-decoration: line-through;
            color: #8ECA3C;
        }

        .delete-btn {
            background: #8ECA3C;
            color: #276F27;
            border: 2px solid #276F27;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .delete-btn:hover {
            background: #276F27;
            color: white;
            transform: scale(1.05);
        }

        .delete-btn i {
            font-size: 0.85rem;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .todo-container {
                padding: 25px 20px;
            }

            .todo-title {
                font-size: 1.5rem;
            }

            .form-input {
                padding: 12px 16px 12px 40px;
                font-size: 0.95rem;
            }

            .add-btn {
                padding: 12px;
                font-size: 0.95rem;
            }

            .todo-item {
                flex-wrap: wrap;
                gap: 10px;
            }

            .delete-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Animation for preview */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-box {
            animation: fadeIn 0.3s ease;
        }

        /* Empty state for todo list */
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #276F27;
            background: white;
            border-radius: 10px;
            border: 2px dashed #8ECA3C;
            margin-top: 15px;
        }

        .empty-state i {
            font-size: 2rem;
            color: #8ECA3C;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- React, ReactDOM, Babel, and PropTypes from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- Babel JSX Script -->
    <script type="text/babel">
        const { useState } = React;

        // TodoForm Component
        function TodoForm() {
            // State to keep track of form value
            const [todoText, setTodoText] = useState('');
            const [todos, setTodos] = useState([]);

            // Handle input change
            const handleInputChange = (event) => {
                setTodoText(event.target.value);
            };

            // Handle form submission
            const handleSubmit = (event) => {
                event.preventDefault();
                if (todoText.trim()) {
                    const newTodo = {
                        id: Date.now(),
                        text: todoText,
                        completed: false
                    };
                    setTodos([...todos, newTodo]);
                    setTodoText(''); // Clear input after adding
                }
            };

            // Handle todo deletion
            const handleDelete = (id) => {
                setTodos(todos.filter(todo => todo.id !== id));
            };

            // Toggle todo completion
            const toggleComplete = (id) => {
                setTodos(todos.map(todo =>
                    todo.id === id ? { ...todo, completed: !todo.completed } : todo
                ));
            };

            return (
                <div className="todo-container">
                    <h1 className="todo-title">
                        <i className="fas fa-tasks"></i>
                        Todo App
                    </h1>

                    {/* Form Section */}
                    <form onSubmit={handleSubmit}>
                        <div className="form-group">
                            <label htmlFor="todoInput">What do you need to do?</label>
                            <div className="input-wrapper">
                                <i className="fas fa-pencil-alt"></i>
                                <input
                                    id="todoInput"
                                    type="text"
                                    className="form-input"
                                    placeholder="Enter your task..."
                                    value={todoText}
                                    onChange={handleInputChange}
                                />
                            </div>
                        </div>
                        <button type="submit" className="add-btn">
                            <i className="fas fa-plus-circle"></i>
                            Add Task
                        </button>
                    </form>

                    {/* Real-time Preview Section */}
                    <div className="preview-section">
                        <h3 className="preview-title">
                            <i className="fas fa-eye"></i> Live Preview
                        </h3>
                        <div className={`preview-box ${todoText ? 'has-value' : ''}`}>
                            {todoText ? (
                                <span className="preview-text">
                                    <i className="fas fa-chevron-right" style={{ color: '#499A13', marginRight: '10px' }}></i>
                                    {todoText}
                                </span>
                            ) : (
                                <span className="preview-empty">
                                    <i className="fas fa-info-circle"></i>
                                    Start typing to see preview...
                                </span>
                            )}
                        </div>
                    </div>

                    {/* Todo Stats */}
                    <div className="todo-stats">
                        <span>Total Tasks</span>
                        <span className="count">{todos.length}</span>
                    </div>

                    {/* Todo List */}
                    {todos.length > 0 ? (
                        <div style={{ marginTop: '20px' }}>
                            {todos.map((todo) => (
                                <div
                                    key={todo.id}
                                    className={`todo-item ${todo.completed ? 'completed' : ''}`}
                                >
                                    <div className="todo-item-left">
                                        <input
                                            type="checkbox"
                                            checked={todo.completed}
                                            onChange={() => toggleComplete(todo.id)}
                                        />
                                        <span className={`todo-item-text ${todo.completed ? 'completed-text' : ''}`}>
                                            {todo.text}
                                        </span>
                                    </div>
                                    <button
                                        onClick={() => handleDelete(todo.id)}
                                        className="delete-btn"
                                    >
                                        <i className="fas fa-trash-alt"></i>
                                        Delete
                                    </button>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="empty-state">
                            <i className="fas fa-clipboard-list"></i>
                            <p>No tasks yet. Add your first task above!</p>
                        </div>
                    )}
                </div>
            );
        }

        // Render the application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TodoForm />);
    </script>
</body>

</html>
